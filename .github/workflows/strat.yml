name: Generate VLESS Config (6-hour validity)

on:
  workflow_dispatch:        # Allow manual trigger
  schedule:
    - cron: '0 */6 * * *'   # Run every 6 hours (optional)

permissions:
  contents: write          # Needed to upload artifacts

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install qrcode[pil] requests

      - name: Run config generator
        run: python main.py

      - name: Upload VLESS link and QR code as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vless-config
          path: |
            vless_link.txt
            vless_qr.png
          retention-days: 1
