name: Generate VLESS Config (6-hour validity)

on:
  workflow_dispatch:          # manual trigger
  schedule:
    - cron: '0 */6 * * *'     # every 6 hours (optional)

permissions:
  contents: write            # needed for artifact upload

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install qrcode[pil]

      - name: Run config generator
        run: python main.py

      - name: Upload VLESS link, QR code and server config
        uses: actions/upload-artifact@v4
        with:
          name: vless-config
          path: |
            vless_link.txt
            vless_qr.png
            /tmp/xray/config.json
          retention-days: 1
