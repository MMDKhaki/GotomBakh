name: Code & Workflow Validation Bot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install qrcode[pil] pyflakes

      - name: Lint Python code (pyflakes)
        run: pyflakes main.py

      - name: Check Python syntax
        run: python -c "import ast; ast.parse(open('main.py').read()); print('main.py syntax OK')"

      - name: Lint GitHub Actions YAML
        uses: actions/yamllint@v1
        with:
          args: '.github/workflows/'

  # Extra: verify that dependencies install correctly
  test-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test pip install
        run: |
          python -m venv testenv
          source testenv/bin/activate
          pip install qrcode[pil]
          python -c "import qrcode; print('Dependencies OK')"
